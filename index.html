<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Acc邮箱查看-安全</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230078d4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z'%3E%3C/path%3E%3Cpolyline points='22,6 12,13 2,6'%3E%3C/polyline%3E%3C/svg%3E">
    <style>
        :root {
            --outlook-blue: #0078d4;
            --outlook-dark-blue: #005a9e;
            --sidebar-bg: #f3f2f1;
            --list-bg: #ffffff;
            --border-color: #edebe9;
            --text-main: #201f1e;
            --text-secondary: #484644;
            --text-muted: #605e5d;
            --hover-bg: #f3f2f1;
            --active-bg: #edebe9;
            --error-red: #d13438;
            --selection-bg: #eff6fc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--sidebar-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--outlook-blue);
            color: white;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
            z-index: 100;
        }

        .logo {
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mail-logo {
            width: 24px;
            height: 24px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .github-link {
            display: flex;
            align-items: center;
            color: white;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s;
            font-weight: 500;
        }

        .github-link:hover {
            opacity: 1;
        }

        .header-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 4px;
            width: 50%;
            max-width: 600px;
            position: relative;
        }

        .header-input-group:focus-within {
            background: white;
        }

        .header-input-group input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }

        .header-input-group:focus-within input {
            color: var(--text-main);
        }

        .header-input-group input::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        .header-input-group:focus-within input::placeholder {
            color: #a19f9d;
        }

        .clear-btn {
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 4px;
            user-select: none;
            display: none;
            font-weight: bold;
        }

        .header-input-group:focus-within .clear-btn {
            color: #a19f9d;
        }

        .header-input-group input:not(:placeholder-shown)~.clear-btn {
            display: block;
        }

        .clear-btn:hover {
            color: white !important;
        }

        .header-input-group:focus-within .clear-btn:hover {
            color: var(--text-main) !important;
        }

        .btn-header {
            background: white;
            color: var(--outlook-blue);
            border: none;
            padding: 4px 16px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-header:hover {
            background: #f3f2f1;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 12px 0;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: background 0.1s;
        }

        .nav-item:hover {
            background: #edebe9;
        }

        .nav-item.active {
            background: #ffffff;
            color: var(--outlook-blue);
            font-weight: 600;
            border-left: 3px solid var(--outlook-blue);
            padding-left: 21px;
        }

        .mail-list-container {
            width: 380px;
            background: var(--list-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .list-toolbar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #faf9f8;
        }

        .list-header {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .mail-items-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .mail-row {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            gap: 12px;
            transition: background 0.1s;
            position: relative;
        }

        .mail-row:hover {
            background: var(--hover-bg);
        }

        .mail-row.active {
            background: var(--selection-bg);
        }

        .back-btn-mobile {
            display: none;
            padding: 6px 16px;
            font-size: 0.95rem;
            color: var(--outlook-blue);
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 2px;
            margin-right: 8px;
        }

        .back-btn-mobile:hover {
            background: #f3f2f1;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            padding-top: 2px;
        }

        .mail-content-preview {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .mail-sender {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .mail-subject {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--outlook-blue);
        }

        .mail-preview-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .mail-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .content-viewer {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .mail-actions-bar {
            padding: 8px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            background: #faf9f8;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .detail-container {
            padding: 32px 40px;
        }

        .detail-subject {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #201f1e;
        }

        .detail-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #0078d4;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .sender-details {
            display: flex;
            flex-direction: column;
        }

        .sender-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .sender-email {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .detail-body {
            line-height: 1.6;
            font-size: 1rem;
            color: #201f1e;
        }

        .welcome-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }

        .btn-action {
            padding: 6px 16px;
            border-radius: 2px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-main);
            transition: all 0.1s;
        }

        .btn-action:hover {
            background: #f3f2f1;
            border-color: #8a8886;
        }

        .btn-action.primary {
            background: var(--outlook-blue);
            color: white;
            border: none;
        }

        .btn-action.primary:hover {
            background: var(--outlook-dark-blue);
        }

        .btn-action.danger {
            color: var(--error-red);
        }

        .btn-action.danger:hover {
            background: #fde7e9;
            border-color: #f7b1b7;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2000;
            justify-content: center;
            align-items: flex-start;
            padding-top: 15vh;
        }

        .modal-card {
            background: white;
            width: 440px;
            border-radius: 2px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px 24px;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-body {
            padding: 0 24px 24px;
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .modal-footer {
            padding: 16px 24px;
            background: #f3f2f1;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        #errorToast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #ffffff;
            color: var(--error-red);
            padding: 12px 24px;
            border-left: 4px solid var(--error-red);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 3000;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .loading-container {
            padding: 40px;
            text-align: center;
            color: var(--outlook-blue);
            font-weight: 500;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 12px 16px;
                height: auto;
                gap: 6px;
                text-align: center;
            }

            .header-input-group {
                width: 100% !important;
                max-width: none;
                margin-top: 4px;
            }

            .logo {
                font-size: 1.2rem;
            }

            main {
                flex-direction: column;
                overflow-y: auto;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                flex-direction: row;
                overflow-x: auto;
                padding: 4px;
            }

            .nav-item {
                padding: 8px 16px;
                border-left: none !important;
                border-bottom: 2px solid transparent;
                white-space: nowrap;
            }

            .nav-item.active {
                border-bottom: 2px solid var(--outlook-blue);
            }

            .mail-list-container {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                height: 40vh;
            }

            .content-viewer {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1000;
                display: none;
                background: white;
            }

            .content-viewer.mobile-active {
                display: flex;
            }

            .back-btn-mobile {
                display: block !important;
            }

            .detail-container {
                padding: 20px;
            }

            .detail-subject {
                font-size: 1.3rem;
            }

            .modal-card {
                width: 90%;
                margin: 0 5%;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #c8c6c4;
            border-radius: 0;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <div class="mail-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </div>
            1Acc邮箱
            <a href="https://github.com/AlexVera0" target="_blank" class="github-link" title="项目主页 / 作者说明">
                <svg height="18" viewBox="0 0 16 16" version="1.1" width="18" aria-hidden="true" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                    </path>
                </svg>
            </a>
        </div>
        <div style="display: flex; align-items: center;">
            <div id="statusText" style="font-size: 0.75rem; font-weight: 500; opacity: 0.8;">准备就绪</div>
        </div>
        <div class="header-input-group">
            <input type="text" id="credentialInput" placeholder="粘贴邮箱信息 (邮箱----密码----ClientID----RefreshToken)">
            <div class="clear-btn" onclick="clearInput()">×</div>
            <button class="btn-header" onclick="fetchMail(currentFolder)">点击收件</button>
        </div>
    </header>

    <main>
        <nav class="sidebar">
            <div class="nav-item active" id="nav-inbox" onclick="switchFolder('inbox')">收件箱</div>
            <div class="nav-item" id="nav-junk" onclick="switchFolder('junkemail')">垃圾邮件</div>
            <div style="margin-top: auto; padding: 12px 24px; font-size: 0.8rem; color: #a19f9d; cursor: pointer;"
                onclick="clearCreds()">清除本地缓存</div>
        </nav>

        <section class="mail-list-container">
            <div class="list-toolbar">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this.checked)">
                    <span class="list-header" id="folderTitle">收件箱</span>
                </div>
                <button class="btn-action danger" id="multiDeleteBtn" style="display: none;"
                    onclick="confirmMultiDelete()">删除选中项</button>
            </div>
            <div class="mail-items-scroll" id="mailList">
                <div class="welcome-view" style="padding: 40px;">输入邮箱信息并点击读取开始同步</div>
            </div>
        </section>

        <section class="content-viewer" id="mainViewer">
            <div class="welcome-view">
                <h2 style="font-weight: 400; color: #a19f9d;">未选择邮件</h2>
                <p>请从列表中选择一封邮件进行查看</p>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-card">
            <div class="modal-header" id="confirmTitle">确认删除</div>
            <div class="modal-body" id="confirmMessage">确定要删除选中的邮件吗？此操作无法撤销。</div>
            <div class="modal-footer">
                <button class="btn-action" onclick="closeModal()">取消</button>
                <button class="btn-action primary danger" id="confirmBtn">删除</button>
            </div>
        </div>
    </div>

    <div id="errorToast"></div>

    <script>
        const API_BASE = '/api/ms-mail';
        let currentFolder = 'inbox';
        let cachedMails = [];
        let selectedIds = new Set();
        let activeMailId = null;

        window.onload = () => {
            const saved = localStorage.getItem('ms_mail_credentials');
            if (saved) document.getElementById('credentialInput').value = saved;
        }

        function clearInput() {
            document.getElementById('credentialInput').value = '';
            document.getElementById('credentialInput').focus();
        }

        function clearCreds() {
            showConfirm('清除缓存', '确定要清除本地保存的邮箱信息吗？', () => {
                localStorage.removeItem('ms_mail_credentials');
                document.getElementById('credentialInput').value = '';
                location.reload();
            });
        }

        function showConfirm(title, message, onConfirm) {
            document.getElementById('confirmTitle').innerText = title;
            document.getElementById('confirmMessage').innerText = message;
            const modal = document.getElementById('confirmModal');
            const confirmBtn = document.getElementById('confirmBtn');

            modal.style.display = 'flex';
            confirmBtn.onclick = () => {
                onConfirm();
                closeModal();
            };
        }

        function closeModal() {
            document.getElementById('confirmModal').style.display = 'none';
        }

        function showError(msg) {
            const toast = document.getElementById('errorToast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 6000);
        }

        function updateStatus(text) {
            document.getElementById('statusText').innerText = text;
        }

        async function switchFolder(folder) {
            currentFolder = folder;
            document.getElementById('nav-inbox').classList.toggle('active', folder === 'inbox');
            document.getElementById('nav-junk').classList.toggle('active', folder === 'junkemail');
            document.getElementById('folderTitle').innerText = folder === 'inbox' ? '收件箱' : '垃圾邮件';

            selectedIds.clear();
            updateToolbar();
            const raw = document.getElementById('credentialInput').value.trim();
            if (raw) fetchMail(folder);
        }

        async function fetchMail(folder) {
            const raw = document.getElementById('credentialInput').value.trim();
            if (!raw) return showError('请先输入邮箱信息');

            localStorage.setItem('ms_mail_credentials', raw);
            const parts = raw.split('----');
            if (parts.length < 4) return showError('邮箱信息格式错误，应为 4 段式');

            const clientId = parts[2].trim();
            const refreshToken = parts[3].trim();

            updateStatus('正在接收邮件...');
            document.getElementById('mailList').innerHTML = '<div class="loading-container">同步中...</div>';

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, refreshToken, folder })
                });

                const result = await response.json();
                if (!result.success) throw new Error(result.error);

                cachedMails = result.data;
                renderMails(cachedMails);
                updateStatus('收件成功');
            } catch (error) {
                updateStatus('同步异常');
                showError(error.message);
                document.getElementById('mailList').innerHTML = '<div style="padding:40px; text-align:center; color:var(--error-red);">读取失败，请检查邮箱信息有效性</div>';
            }
        }

        function toggleSelectAll(checked) {
            selectedIds.clear();
            if (checked) {
                cachedMails.forEach(m => selectedIds.add(m.id));
            }
            renderMails(cachedMails);
            updateToolbar();
        }

        function toggleSelect(id, event) {
            event.stopPropagation();
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            updateToolbar();
            document.getElementById(`mail-row-${id}`).classList.toggle('active', selectedIds.has(id) || activeMailId === id);
        }

        function updateToolbar() {
            const btn = document.getElementById('multiDeleteBtn');
            const selectAll = document.getElementById('selectAll');

            btn.style.display = selectedIds.size > 0 ? 'block' : 'none';
            btn.innerText = `删除 ${selectedIds.size} 项`;
            selectAll.checked = selectedIds.size > 0 && selectedIds.size === cachedMails.length;
        }

        function renderMails(mails) {
            const list = document.getElementById('mailList');
            if (!mails || mails.length === 0) {
                list.innerHTML = '<div style="padding:40px; text-align:center; color:#a19f9d;">文件夹为空</div>';
                return;
            }

            list.innerHTML = mails.map((mail) => {
                const date = new Date(mail.receivedDateTime);
                const isSelected = selectedIds.has(mail.id);
                const isActive = activeMailId === mail.id;

                const timeStr = date.toLocaleDateString() === new Date().toLocaleDateString()
                    ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    : date.toLocaleDateString([], { month: 'short', day: 'numeric' });

                return `
                    <div class="mail-row ${isActive || isSelected ? 'active' : ''}" id="mail-row-${mail.id}" onclick="showMail('${mail.id}')">
                        <div class="checkbox-container">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleSelect('${mail.id}', event)">
                        </div>
                        <div class="mail-content-preview">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <div class="mail-sender">${mail.from?.emailAddress?.name || mail.from?.emailAddress?.address || '未知'}</div>
                                <div class="mail-date">${timeStr}</div>
                            </div>
                            <div class="mail-subject">${mail.subject || '(无主题)'}</div>
                            <div class="mail-preview-text">${extractText(mail.body?.content)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function extractText(html) {
            if (!html) return '';
            const tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return (tmp.textContent || tmp.innerText || "").substring(0, 100);
        }

        async function showMail(id) {
            activeMailId = id;
            document.querySelectorAll('.mail-row').forEach(r => r.classList.remove('active'));
            document.getElementById(`mail-row-${id}`).classList.add('active');

            const mail = cachedMails.find(m => m.id === id);
            const initials = (mail.from?.emailAddress?.name || 'U').charAt(0).toUpperCase();

            document.getElementById('mainViewer').innerHTML = `
                <div class="mail-actions-bar">
                    <div class="back-btn-mobile" onclick="closeMailMobile()">返回</div>
                    <button class="btn-action danger" onclick="confirmDelete('${mail.id}')">删除</button>
                    <button class="btn-action" onclick="switchFolder(currentFolder)">刷新</button>
                </div>
                <div class="detail-container">
                    <div class="detail-subject">${mail.subject || '(无主题)'}</div>
                    <div class="detail-info">
                        <div class="avatar">${initials}</div>
                        <div class="sender-details">
                            <span class="sender-name">${mail.from?.emailAddress?.name || ''}</span>
                            <span class="sender-email">${mail.from?.emailAddress?.address || ''}</span>
                        </div>
                        <div style="margin-left:auto; font-size:0.85rem; color: #605e5d;">
                            ${new Date(mail.receivedDateTime).toLocaleString()}
                        </div>
                    </div>
                    <div class="detail-body">${mail.body?.content || ''}</div>
                </div>
            `;

            if (window.innerWidth <= 768) {
                document.getElementById('mainViewer').classList.add('mobile-active');
            }
        }

        function closeMailMobile() {
            document.getElementById('mainViewer').classList.remove('mobile-active');
            activeMailId = null;
            document.querySelectorAll('.mail-row').forEach(r => r.classList.remove('active'));
        }

        function confirmDelete(id) {
            showConfirm('删除确认', '确定要删除这封邮件吗？', () => execDelete([id]));
        }

        function confirmMultiDelete() {
            showConfirm('批量删除', `确定要删除选中的 ${selectedIds.size} 封邮件吗？`, () => execDelete(Array.from(selectedIds)));
        }

        async function execDelete(ids) {
            const raw = document.getElementById('credentialInput').value.trim();
            const parts = raw.split('----');
            const clientId = parts[2].trim();
            const refreshToken = parts[3].trim();

            updateStatus('正在接收邮件...');

            try {
                const promises = ids.map(id => fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, refreshToken })
                }));

                const results = await Promise.all(promises);
                const fails = results.filter(r => !r.ok);

                if (fails.length > 0) throw new Error(`有 ${fails.length} 封邮件删除失败`);

                updateStatus('删除完成');
                cachedMails = cachedMails.filter(m => !ids.includes(m.id));
                selectedIds.clear();

                if (ids.includes(activeMailId)) {
                    document.getElementById('mainViewer').innerHTML = `
                        <div class="welcome-view">
                            <h2 style="font-weight: 400; color: #a19f9d;">邮件已删除</h2>
                        </div>
                    `;
                }

                renderMails(cachedMails);
                updateToolbar();
            } catch (error) {
                updateStatus('删除异常');
                showError(error.message);
            }
        }
    </script>
</body>

</html>
